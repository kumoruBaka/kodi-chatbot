<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Kodi AI</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(30, 41, 59, 0.7);
      --glass-border: rgba(255, 255, 255, 0.1);
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* Abstract shapes background */
    .bg-shape {
      position: absolute;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
    }
    .shape-1 { width: 400px; height: 400px; background: #3b82f6; top: -100px; left: -100px; border-radius: 50%; }
    .shape-2 { width: 500px; height: 500px; background: #8b5cf6; bottom: -150px; right: -150px; border-radius: 50%; }

    .login-container {
      position: relative;
      z-index: 10;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: floatIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes floatIn {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      background: linear-gradient(to right, #a78bfa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 1rem;
      margin-bottom: 40px;
    }

    .google-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      overflow: hidden;
    }

    .google-btn:hover:not(.loading) {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(0,0,0,0.5);
    }

    .btn-content {
      display: flex;
      align-items: center;
      gap: 12px;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .google-btn svg {
      width: 24px;
      height: 24px;
    }

    .loading-spinner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .google-btn.loading {
      cursor: not-allowed;
      background: rgba(255, 255, 255, 0.02);
    }

    .google-btn.loading .btn-content {
      opacity: 0;
      transform: scale(0.9);
    }

    .google-btn.loading .loading-spinner {
      opacity: 1;
      transform: scale(1);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-text {
      margin-top: 30px;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>

  <div class="login-container">
    <div class="logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a78bfa" />
            <stop offset="100%" stop-color="#3b82f6" />
          </linearGradient>
        </defs>
        <path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/>
      </svg>
      Kodi
    </div>
    <div class="subtitle">Log in to sync your chats across devices.</div>

    <a href="/auth/google" class="google-btn" id="loginBtn">
      <span class="btn-content">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </span>
      <div class="loading-spinner"></div>
    </a>

    <div class="footer-text">
      By continuing, you agree to our Terms of Service.
    </div>
  </div>

  <script>
    // Check if already authenticated to prevent unnecessary login clicks
    fetch('/api/auth/me')
      .then(res => res.json())
      .then(data => {
        if (data.authenticated) {
          window.location.href = '/';
        }
      })
      .catch(console.error);

    // Add loading animation on click
    document.getElementById('loginBtn').addEventListener('click', function(e) {
      if (this.classList.contains('loading')) {
        e.preventDefault();
        return;
      }
      
      e.preventDefault();
      this.classList.add('loading');
      
      // Delay navigation slightly to let animation play
      setTimeout(() => {
        window.location.href = this.href;
      }, 600);
    });
  </script>
</body>
</html>
